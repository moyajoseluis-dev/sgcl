version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sgcl_postgres
    restart: always
    environment:
      POSTGRES_USER: sgcl_admin
      POSTGRES_PASSWORD: password_seguro_123
      POSTGRES_DB: sgcl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis lo agregaremos más adelante para colas y caché, lo dejamos listo
  redis:
    image: redis:7-alpine
    container_name: sgcl_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: